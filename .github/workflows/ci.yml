name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  contracts:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          components: clippy
      - name: Install cargo-audit
        run: cargo install cargo-audit
      - name: Security audit
        run: cargo audit
        working-directory: contracts
        continue-on-error: true
      - name: Build
        run: cargo build --release
        working-directory: contracts
      - name: Test
        run: cargo test
        working-directory: contracts
      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings
        working-directory: contracts
      - name: Code coverage
        run: cargo install cargo-tarpaulin && cargo tarpaulin --out xml
        working-directory: contracts
        continue-on-error: true

  api:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install
        run: npm ci
        working-directory: api
      - name: Security audit
        run: npm audit --audit-level=high
        working-directory: api
        continue-on-error: true
      - name: Lint
        run: npm run lint
        working-directory: api
      - name: Test
        run: npm run test
        working-directory: api
      - name: Build
        run: npm run build
        working-directory: api

  frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install
        run: npm ci
        working-directory: frontend
      - name: Security audit
        run: npm audit --audit-level=high
        working-directory: frontend
        continue-on-error: true
      - name: Lint
        run: npm run lint
        working-directory: frontend
      - name: Test
        run: npm run test -- --watch=false --browsers=ChromeHeadless
        working-directory: frontend
        continue-on-error: true
      - name: Build
        run: npm run build
        working-directory: frontend

  deploy-testnet:
    if: github.ref == 'refs/heads/main' && github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    needs: [contracts, api, frontend]
    steps:
      - uses: actions/checkout@v4
      - name: Deploy contracts to testnet
        run: ./scripts/deploy-testnet.sh
        env:
          STELLAR_SECRET_KEY: ${{ secrets.STELLAR_TESTNET_SECRET }}
